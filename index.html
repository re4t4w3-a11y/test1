<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>多平台預約系統</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .section { margin-bottom: 30px; }
    .hidden { display: none; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 5px; text-align: center; }
  </style>
</head>
<body>
  <h1>多平台預約系統</h1>

  <!-- 使用者預約界面 -->
  <div class="section" id="userSection">
    <h2>使用者預約</h2>
    <label>名字: <input type="text" id="userName"></label><br>
    <label>密碼: <input type="password" id="userPw"></label><br>
    <label>類別:
      <select id="category">
        <option value="科技">科技</option>
        <option value="練兵">練兵</option>
        <option value="建築">建築</option>
      </select>
    </label><br>
    <label>星期:
      <select id="weekday">
        <option value="Monday">星期一</option>
        <option value="Tuesday">星期二</option>
        <option value="Wednesday">星期三</option>
        <option value="Thursday">星期四</option>
        <option value="Friday">星期五</option>
        <option value="Saturday">星期六</option>
        <option value="Sunday">星期日</option>
      </select>
    </label><br>
    <label>時間 (UTC+0, 每10分鐘):
      <input type="time" id="time" step="600">
    </label><br>
    <button onclick="makeReservation()">預約</button>
  </div>

  <!-- 管理員界面 -->
  <div class="section" id="adminLogin">
    <h2>管理員登入</h2>
    <label>管理員密碼: <input type="password" id="adminPw"></label>
    <button onclick="adminLogin()">登入</button>
  </div>

  <div class="section hidden" id="adminSection">
    <h2>管理員界面</h2>
    <button onclick="clearDay()">清空當日預約</button>
    <div id="reservationList"></div>
  </div>

  <script>
    // 🔧 Firebase 設定 (請替換成你自己的專案設定)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 使用者預約
    function makeReservation() {
      const name = document.getElementById("userName").value;
      const pw = document.getElementById("userPw").value;
      const category = document.getElementById("category").value;
      const weekday = document.getElementById("weekday").value;
      const time = document.getElementById("time").value;

      if (!name || !pw || !time) {
        alert("請完整填寫資料");
        return;
      }

      const path = `reservations/${category}/${weekday}/${time}`;
      db.ref(path).set({ name, pw });
      alert("預約成功！");
    }

    // 管理員登入
    function adminLogin() {
      const pw = document.getElementById("adminPw").value;
      if (pw === "3^!Feq45&") {
        document.getElementById("adminSection").classList.remove("hidden");
        loadReservations();
      } else {
        alert("密碼錯誤");
      }
    }

    // 顯示預約清單
    function loadReservations() {
      const listDiv = document.getElementById("reservationList");
      db.ref("reservations").on("value", snapshot => {
        const data = snapshot.val();
        listDiv.innerHTML = "";
        if (!data) {
          listDiv.innerHTML = "<p>目前沒有預約</p>";
          return;
        }
        for (let category in data) {
          for (let weekday in data[category]) {
            const table = document.createElement("table");
            const header = document.createElement("tr");
            header.innerHTML = `<th colspan="3">${category} - ${weekday}</th>`;
            table.appendChild(header);
            for (let time in data[category][weekday]) {
              const res = data[category][weekday][time];
              const row = document.createElement("tr");
              row.innerHTML = `<td>${time}</td><td>${res.name}</td>
                <td><button onclick="cancelReservation('${category}','${weekday}','${time}')">取消</button></td>`;
              table.appendChild(row);
            }
            listDiv.appendChild(table);
          }
        }
      });
    }

    // 管理員取消單一預約
    function cancelReservation(category, weekday, time) {
      const path = `reservations/${category}/${weekday}/${time}`;
      db.ref(path).remove();
      alert("已取消預約");
    }

    // 管理員清空當日預約 (以星期一為例，可改成動態選擇)
    function clearDay() {
      const weekday = prompt("請輸入要清空的星期 (Monday-Sunday):");
      if (!weekday) return;
      db.ref("reservations").once("value", snapshot => {
        const data = snapshot.val();
        if (!data) return;
        for (let category in data) {
          db.ref(`reservations/${category}/${weekday}`).remove();
        }
        alert(`${weekday} 的預約已清空`);
      });
    }
  </script>
</body>
</html>
